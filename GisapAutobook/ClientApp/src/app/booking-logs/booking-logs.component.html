<div class="toolbar">
  <button mat-icon-button (click)="router.navigate(['/'])">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h2>Booking Logs &mdash; Schedule #{{ scheduleId }}</h2>
  <button mat-icon-button matTooltip="Refresh" (click)="load()">
    <mat-icon>refresh</mat-icon>
  </button>
</div>

<div *ngIf="loading" class="spinner-wrap"><mat-spinner diameter="48"></mat-spinner></div>

<table *ngIf="!loading" mat-table [dataSource]="logs" class="full-table mat-elevation-z2">

  <ng-container matColumnDef="runAt">
    <th mat-header-cell *matHeaderCellDef>Run At (UTC)</th>
    <td mat-cell *matCellDef="let l">{{ l.runAt | date:'medium' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let l">
      <mat-chip
        [color]="l.status === 'Success' ? 'primary' : l.status === 'Failed' ? 'warn' : ''"
        highlighted>
        {{ l.status }}
      </mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="error">
    <th mat-header-cell *matHeaderCellDef>Error</th>
    <td mat-cell *matCellDef="let l" class="error-cell">{{ l.errorMessage ?? '—' }}</td>
  </ng-container>

  <ng-container matColumnDef="screenshot">
    <th mat-header-cell *matHeaderCellDef>Screenshot</th>
    <td mat-cell *matCellDef="let l">
      <span *ngIf="l.screenshotPath">{{ l.screenshotPath }}</span>
      <span *ngIf="!l.screenshotPath">—</span>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4" style="text-align:center; padding: 24px;">No logs yet.</td>
  </tr>
</table>
